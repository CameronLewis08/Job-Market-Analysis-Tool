version: 2

models:
  - name: mart_skill_salary
    description: Salary stats by skill parsed from salary_raw
    columns:
      - name: skill
        tests:
          - not_null
      - name: avg_salary
        tests:
          - not_null
      - name: coverage_pct
        tests:
          - not_null

  - name: mart_industry_hiring
    description: Weekly listing volume by category
    columns:
      - name: week_start
        tests:
          - not_null
      - name: category
        tests:
          - not_null
      - name: listing_count
        tests:
          - not_null

  - name: mart_skill_cooccurrence
    description: Skill-pair co-occurrence counts based on shared listing mentions
    columns:
      - name: skill_a
        tests:
          - not_null
      - name: skill_b
        tests:
          - not_null
      - name: cooccurrence_count
        tests:
          - not_null

  - name: mart_weekly_trends
    description: Listing count per skill per ISO week, for trend charting
    columns:
      - name: week_start
        tests:
          - not_null
      - name: skill
        tests:
          - not_null
      - name: listing_count
        tests:
          - not_null

  - name: mart_skill_frequency
    description: Count of listings mentioning each skill, grouped by skill category
    columns:
      - name: skill
        tests:
          - not_null
          - unique
      - name: listing_count
        tests:
          - not_null
